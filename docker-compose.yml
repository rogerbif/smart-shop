version: '3.8'

services:
  smartshop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartshop-app
    ports:
      - "3001:3000"
    volumes:
      # Sincronização de arquivos para Hot Reloading local
      - .:/app
      # Impedir que o host altere pastas internas compiladas no container
      - /app/node_modules
      - /app/.next
      # Volume persistente para o banco de dados SQLite
      - smartshop-data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3000
    restart: always

volumes:
  smartshop-data:
    name: smartshop-sqlite-data
